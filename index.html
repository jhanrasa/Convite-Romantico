<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quer sair comigo? ❤️</title>
  <!-- Google Fonts - Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div class="phone-container">
    <div class="phone-screen">
      <!-- Dynamic Island simular celular moderno -->
      <div class="dynamic-island"></div>
      
      <!-- Container para Corações Flutuantes -->
      <div class="hearts-container" id="hearts-container"></div>
      
      <!-- Container para Pílulas de Alerta ("Pensa bem...", "Por favor!!") -->
      <div class="warning-pill-container" id="warning-container"></div>
      
      <!-- Wrapper principal para as telas -->
      <div class="screen-wrapper">
        
        <!-- TELA 1: O PEDIDO -->
        <section class="screen active" id="screen-1">
          <div class="emoji-container animate-float" id="emoji-trigger" style="cursor: pointer;" title="Double click para abrir configurações">
            <!-- Emoji Súplica (🥺) -->
            <svg class="emoji-svg" viewBox="0 0 100 100">
              <defs>
                <radialGradient id="face-gradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
                  <stop offset="0%" stop-color="#FFF3A7" />
                  <stop offset="70%" stop-color="#FFD13B" />
                  <stop offset="100%" stop-color="#E59B00" />
                </radialGradient>
                <radialGradient id="eye-shimmer" cx="35%" cy="35%" r="35%">
                  <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
                  <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
                </radialGradient>
                <filter id="cheek-glow">
                  <feGaussianBlur stdDeviation="3" />
                </filter>
              </defs>
              <!-- Rosto -->
              <circle cx="50%" cy="50%" r="45" fill="url(#face-gradient)" stroke="#D48600" stroke-width="1.5" />
              <!-- Bochechas Coradas -->
              <circle cx="23" cy="62" r="8" fill="#FF8CA3" opacity="0.6" filter="url(#cheek-glow)" />
              <circle cx="77" cy="62" r="8" fill="#FF8CA3" opacity="0.6" filter="url(#cheek-glow)" />
              <!-- Sobrancelhas Tristes -->
              <path d="M 22,33 Q 32,27 38,34" fill="none" stroke="#663E00" stroke-width="3" stroke-linecap="round" />
              <path d="M 78,33 Q 68,27 62,34" fill="none" stroke="#663E00" stroke-width="3" stroke-linecap="round" />
              <!-- Olho Esquerdo Pidão -->
              <circle cx="33" cy="48" r="12" fill="#1C1813" />
              <circle cx="30" cy="44" r="5" fill="#FFFFFF" />
              <circle cx="36" cy="51" r="2.5" fill="#FFFFFF" />
              <circle cx="33" cy="48" r="10" fill="#0072FF" opacity="0.15" />
              <!-- Olho Direito Pidão -->
              <circle cx="67" cy="48" r="12" fill="#1C1813" />
              <circle cx="64" cy="44" r="5" fill="#FFFFFF" />
              <circle cx="70" cy="51" r="2.5" fill="#FFFFFF" />
              <circle cx="67" cy="48" r="10" fill="#0072FF" opacity="0.15" />
              <!-- Boca de Súplica -->
              <path d="M 44,70 Q 50,65 56,70" fill="none" stroke="#663E00" stroke-width="3" stroke-linecap="round" />
              <!-- Mãozinha tímida (opcional e fofa) -->
              <path d="M 42,75 C 44,78 46,78 48,75 C 49,73 47,73 45,75" fill="#FFD13B" stroke="#D48600" stroke-width="1" />
            </svg>
          </div>
          
          <div class="card">
            <h2>VOCÊ ACEITARIA IR À UM DATE COMIGO?</h2>
            <div class="btn-group">
              <button class="btn btn-yes" id="btn-yes-1">SIM</button>
              <button class="btn btn-no" id="btn-no">NÃO</button>
            </div>
          </div>
        </section>
        
        <!-- TELA 2: VOCÊ DISSE SIM? -->
        <section class="screen" id="screen-2">
          <div class="emoji-container animate-float">
            <!-- Emoji Charmoso com Rosa na boca (😎/🌹) -->
            <svg class="emoji-svg" viewBox="0 0 100 100">
              <defs>
                <linearGradient id="rose-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FF3B30" />
                  <stop offset="100%" stop-color="#990000" />
                </linearGradient>
              </defs>
              <!-- Rosto -->
              <circle cx="50%" cy="50%" r="45" fill="url(#face-gradient)" stroke="#D48600" stroke-width="1.5" />
              <!-- Sobrancelha Charmosa -->
              <path d="M 22,30 Q 32,24 40,28" fill="none" stroke="#663E00" stroke-width="3.5" stroke-linecap="round" />
              <path d="M 78,32 Q 68,26 60,30" fill="none" stroke="#663E00" stroke-width="3" stroke-linecap="round" />
              <!-- Olhos Semicerrados / Galanteador -->
              <path d="M 22,46 Q 32,38 42,46" fill="none" stroke="#1C1813" stroke-width="4.5" stroke-linecap="round" />
              <path d="M 58,46 Q 68,38 78,46" fill="none" stroke="#1C1813" stroke-width="4.5" stroke-linecap="round" />
              <!-- Sorriso de Canto de Boca -->
              <path d="M 45,68 Q 58,72 63,60" fill="none" stroke="#663E00" stroke-width="3.5" stroke-linecap="round" />
              <!-- Rosa na Boca -->
              <!-- Cabo -->
              <path d="M 28,68 Q 38,68 46,65" fill="none" stroke="#28CD41" stroke-width="3" stroke-linecap="round" />
              <!-- Folha -->
              <path d="M 33,68 Q 32,62 37,64 Q 38,68 33,68" fill="#28CD41" stroke="#1A8C27" stroke-width="0.5" />
              <!-- Flor da Rosa -->
              <path d="M 28,68 C 24,64 20,64 18,68 C 16,72 20,76 24,74 C 20,78 24,82 28,78 C 32,82 36,78 32,74 C 36,76 40,72 38,68 C 36,64 32,64 28,68 Z" fill="url(#rose-gradient)" stroke="#660000" stroke-width="1" />
            </svg>
          </div>
          
          <div class="card">
            <h2>VOCÊ DISSE SIM? 🥺</h2>
            <p class="subtitle">Eu estava esperando você dizer não kkkk</p>
            <button class="btn btn-primary" id="btn-next-2">PRÓXIMO ➔</button>
          </div>
        </section>
        
        <!-- TELA 3: ESCOLHA DA COMIDA -->
        <section class="screen" id="screen-3">
          <div class="card food-card">
            <h2>O QUE TÁ AFIM? 😋</h2>
            
            <div class="food-grid">
              <div class="food-item" data-food="Hambúrguer">
                <span class="food-icon">🍔</span>
                <span class="food-label">Hambúrguer</span>
              </div>
              <div class="food-item" data-food="Sushi">
                <span class="food-icon">🍣</span>
                <span class="food-label">Sushi</span>
              </div>
              <div class="food-item" data-food="Massas">
                <span class="food-icon">🍝</span>
                <span class="food-label">Massas</span>
              </div>
              <div class="food-item" data-food="Tacos">
                <span class="food-icon">🌮</span>
                <span class="food-label">Tacos</span>
              </div>
              <div class="food-item" data-food="Pizza">
                <span class="food-icon">🍕</span>
                <span class="food-label">Pizza</span>
              </div>
            </div>
            
            <button class="btn btn-primary" id="btn-next-3" disabled>BORA! ➔</button>
          </div>
        </section>
        
        <!-- TELA 4: SELEÇÃO DE DATA E HORA -->
        <section class="screen" id="screen-4">
          <div class="card date-card">
            <h2>📅 QUANDO VOCÊ TÁ LIVRE?</h2>
            
            <!-- Inputs padrões (visíveis se não houver slots na URL) -->
            <div id="default-date-selectors" style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
              <div class="input-group">
                <label for="date-input">Escolhe a data</label>
                <input type="date" id="date-input" required>
              </div>
              
              <div class="input-group">
                <label for="time-input">Escolhe o horário</label>
                <input type="time" id="time-input" value="19:00" required>
              </div>
            </div>

            <!-- Seleção de slots pré-definidos (visível se houver slots na URL) -->
            <div id="slots-select-container" class="slots-select-container" style="display: none; width: 100%;">
              <p class="subtitle" style="margin-bottom: 10px; font-size: 0.9rem;">Escolha um dos horários disponíveis:</p>
              <div class="slots-grid" id="slots-grid">
                <!-- Inserido dinamicamente via JS -->
              </div>
            </div>
            
            <button class="btn btn-primary" id="btn-next-4" style="margin-top: 5px;">SELECIONAR A DATA ➔</button>
          </div>
        </section>
        
        <!-- TELA 5: RESUMO E WHATSAPP -->
        <section class="screen" id="screen-5">
          <div class="emoji-container animate-pulse">
            <!-- Emoji Apaixonado com Olhos de Coração (😍) -->
            <svg class="emoji-svg" viewBox="0 0 100 100">
              <!-- Rosto -->
              <circle cx="50%" cy="50%" r="45" fill="url(#face-gradient)" stroke="#D48600" stroke-width="1.5" />
              <!-- Bochechas Coradas -->
              <circle cx="23" cy="62" r="8" fill="#FF8CA3" opacity="0.6" filter="url(#cheek-glow)" />
              <circle cx="77" cy="62" r="8" fill="#FF8CA3" opacity="0.6" filter="url(#cheek-glow)" />
              <!-- Olho Coração Esquerdo -->
              <path d="M 22,46 C 16,36 30,30 32,44 C 34,30 48,36 42,46 L 32,58 Z" fill="#FF3B30" stroke="#CC1100" stroke-width="0.5" />
              <!-- Olho Coração Direito -->
              <path d="M 58,46 C 52,36 66,30 68,44 C 70,30 84,36 78,46 L 68,58 Z" fill="#FF3B30" stroke="#CC1100" stroke-width="0.5" />
              <!-- Sorriso Muito Feliz -->
              <path d="M 32,62 Q 50,78 68,62 C 68,62 68,76 50,76 C 32,76 32,62 32,62 Z" fill="#663E00" />
            </svg>
          </div>
          
          <div class="card summary-card">
            <h2>TUDO COMBINADO! 💖</h2>
            <div class="summary-text" id="summary-details">
              <!-- Preenchido dinamicamente via JS -->
            </div>
            <button class="btn btn-whatsapp" id="btn-whatsapp">
              AVISAR O <span id="inviter-name">JEAN</span> ➔
            </button>
          </div>
        </section>
        
      </div>

      <!-- MODAL ADMINISTRATIVO OCULTO -->
      <div class="admin-modal" id="admin-modal" style="display: none;">
        <div class="admin-card">
          <div class="admin-header">
            <h3>Configurações 🛠️</h3>
            <button class="btn-close-admin" id="btn-close-admin">&times;</button>
          </div>
          
          <div class="admin-content">
            <div class="input-group-admin">
              <label for="admin-name">Seu Nome</label>
              <input type="text" id="admin-name" placeholder="Ex: Jean">
            </div>
            
            <div class="input-group-admin" style="margin-top: 12px;">
              <label for="admin-phone">Seu WhatsApp (apenas números)</label>
              <input type="text" id="admin-phone" placeholder="Ex: 5516996332657">
            </div>
            
            <div class="admin-divider"></div>
            
            <h4>Cadastrar Horários Livres</h4>
            <div class="admin-slot-add">
              <input type="date" id="admin-slot-date">
              <input type="time" id="admin-slot-time" value="19:00">
              <button class="btn-add-slot" id="btn-add-slot">+</button>
            </div>
            
            <div class="admin-slots-list-container">
              <label>Horários Adicionados:</label>
              <ul class="admin-slots-list" id="admin-slots-list">
                <!-- Inserido dinamicamente via JS -->
              </ul>
            </div>
            
            <button class="btn btn-primary btn-generate-link" id="btn-generate-link" style="margin-top: 10px;">
              Gerar & Copiar Link 🔗
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
